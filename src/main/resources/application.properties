spring.application.name=techflow-tasks
server.port=8080

# H2 in-memory database (perfeito para desenvolvimento e testes)
spring.datasource.url=jdbc:h2:mem:techflowdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (acessivel em /h2-console durante desenvolvimento)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Thymeleaf (desabilita cache em dev para reload rapido)
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# Logging
logging.level.com.techflow.tasks=INFO
logging.level.org.springframework.web=INFO
